version: 2
updates:
  # Mises à jour des GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Mises à jour des dépendances système ou scripts (si tu ajoutes du code)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Mises à jour Python (si tu ajoutes des scripts Python)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
